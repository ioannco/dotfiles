### ~/.tmux.conf — works on WSL and macOS ###

# -- detect OS (evaluated once at load time) ----------------------------
# Used in if-shell blocks throughout this file
# macOS:  uname = Darwin
# WSL:    /proc/version contains "microsoft"

# -- general settings --------------------------------------------------

set -g default-terminal "tmux-256color"

# RGB color support: macOS terminals and Windows Terminal both support it
if-shell "uname | grep -q Darwin" \
  "set -ag terminal-overrides ',xterm-256color:RGB,alacritty:RGB'" \
  "set -ag terminal-overrides ',xterm-256color:RGB'"

set -g history-limit 50000        # bigger scrollback
set -g mouse on                   # enable mouse support (scroll, select, resize panes)
set -sg escape-time 0             # no delay for escape key (helps vim/neovim)
set -g focus-events on            # let apps know when pane is focused
set -g renumber-windows on        # renumber windows when one is closed
set -g base-index 1               # start window numbering at 1
setw -g pane-base-index 1         # start pane numbering at 1
set -g set-titles on              # set terminal window title
set -g set-titles-string "#T - #W"

# -- prefix key ----------------------------------------------------------
# Ctrl-a instead of default Ctrl-b (easier to reach)
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# -- reload config quickly ------------------------------------------------
bind r source-file ~/.tmux.conf \; display-message "Config reloaded!"

# -- splitting panes (more intuitive than % and ") -------------------------
unbind %
unbind '"'
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# New windows open in the current pane's path
bind c new-window -c "#{pane_current_path}"

# -- pane navigation (vim-style) -------------------------------------------
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# -- pane resizing (repeatable) --------------------------------------------
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# -- window navigation -----------------------------------------------------
bind -r p previous-window
bind -r n next-window
bind Tab last-window           # quickly toggle between last two windows

# -- copy mode (vim-style) -------------------------------------------------
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi Escape send -X cancel

# Clipboard integration — per OS:
#   macOS → pbcopy
#   WSL   → clip.exe (Windows native, no xclip needed)
#   Linux → xclip
if-shell "uname | grep -q Darwin" \
  "bind -T copy-mode-vi y send -X copy-pipe-and-cancel 'pbcopy'" \
  "if-shell 'grep -qi microsoft /proc/version 2>/dev/null' \
    'bind -T copy-mode-vi y send -X copy-pipe-and-cancel \"clip.exe\"' \
    'bind -T copy-mode-vi y send -X copy-pipe-and-cancel \"xclip -in -selection clipboard\"'"

# Sync tmux clipboard with system clipboard automatically
# (covers mouse-drag selections, not just explicit "y" presses)
set -g set-clipboard on

# -- pane borders ----------------------------------------------------------
set -g pane-border-style fg=colour238
set -g pane-active-border-style fg=colour39

# -- status bar ------------------------------------------------------------
set -g status-position bottom
set -g status-interval 5            # refresh every 5s
set -g status-justify left

set -g status-style bg=colour234,fg=colour137

set -g status-left-length 30
set -g status-left "#[bg=colour39,fg=colour234,bold] #S #[bg=colour234,fg=colour39] "

set -g status-right-length 60
set -g status-right "#[fg=colour137]#(whoami) #[fg=colour244]| %Y-%m-%d %H:%M "

setw -g window-status-current-style bg=colour39,fg=colour234,bold
setw -g window-status-current-format " #I:#W "
setw -g window-status-style fg=colour137
setw -g window-status-format " #I:#W "

# Highlight windows with activity
setw -g monitor-activity on
set -g visual-activity off

# -- quality-of-life -------------------------------------------------------

# Synchronize panes toggle (type in all panes at once)
bind S setw synchronize-panes \; display-message "Sync panes: #{?pane_synchronized,ON,OFF}"

# Kill pane/window without confirmation
bind x kill-pane
bind X kill-window

# Show pane numbers longer on prefix+q
set -g display-panes-time 2000

# -- plugins (requires TPM: https://github.com/tmux-plugins/tpm) ----------
# Install TPM: git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm
# Then uncomment below and press prefix+I to install plugins
# set -g @plugin 'tmux-plugins/tpm'
# set -g @plugin 'tmux-plugins/tmux-sensible'
# set -g @plugin 'tmux-plugins/tmux-resurrect'   # persist sessions across reboots
# set -g @plugin 'tmux-plugins/tmux-continuum'   # auto-save sessions
# run '~/.tmux/plugins/tpm/tpm'
